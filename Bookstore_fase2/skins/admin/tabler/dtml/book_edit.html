<div class="card">
    <div class="card-header">
        <h3 class="card-title"><[form_title]></h3>
    </div>
    
    <[error_message_html]>

    <div class="card-body">
        <form action="book_edit.php<[query_string]>" method="POST" enctype="multipart/form-data">
            <input type="hidden" name="id" value="<[book_id]>">
            <input type="hidden" name="current_image" value="<[book_image]>">

            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label class="form-label required">Titolo Libro</label>
                        <input type="text" class="form-control" name="title" value="<[book_title]>" required>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label class="form-label required">ISBN</label>
                        <input type="text" class="form-control" name="isbn" value="<[book_isbn]>" required placeholder="es. 978-3-16-148410-0">
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-md-4">
                    <div class="mb-3">
                        <label class="form-label required">Prezzo (€)</label>
                        <input type="number" step="0.01" min="0.01" class="form-control" name="price" value="<[book_price]>" required>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="mb-3">
                        <label class="form-label required">Disponibilità (Stock)</label>
                        <input type="number" step="1" min="0" class="form-control" name="stock" value="<[book_stock]>" required>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="mb-3">
                        <label class="form-label">Anno Pubblicazione</label>
                        <input type="number" min="1000" max="2100" class="form-control" name="publication_year" value="<[book_year]>">
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label class="form-label">Editore</label>
                        <select class="form-select" name="publisher_id">
                            <[publisher_options]>
                        </select>
                    </div>
                </div>
                <div class="col-md-6">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Autore</label>
                <select class="form-select" name="author_id">
                    <[author_options]>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Generi / Categorie</label>
                <div class="form-selectgroup">
                    <[categories_checkboxes]>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Descrizione</label>
                <textarea class="form-control" name="description" rows="5"><[book_description]></textarea>
            </div>

            <div class="mb-3">
                <div class="form-label">Immagine di Copertina</div>
                <[current_image_html]>
                <input type="file" class="form-control" name="cover_image" accept="image/jpeg, image/png, image/webp">
                <small class="form-hint">Lascia vuoto se non vuoi modificare l'immagine attuale. Tipi consentiti: JPG, PNG, WEBP.</small>
            </div>

            <div class="form-footer text-end">
                <a href="books.php" class="btn btn-link">Annulla</a>
                <button type="submit" class="btn btn-primary">Salva Libro</button>
            </div>
        </form>
    </div>
</div>
